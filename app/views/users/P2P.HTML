<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>P2P Messages</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f2f4f8;
    }

    .chat-container {
      display: flex;
      height: 100vh;
    }

   
    .sidebar {
      width: 30%;
      background: #1f2937;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 15px;
    }

    .chat-item {
      padding: 10px;
      margin-bottom: 10px;
      background: #374151;
      border-radius: 8px;
    }

    .chat-item.active {
      background: #3b82f6;
    }

    .name {
      font-weight: bold;
    }

    .preview {
      font-size: 12px;
      opacity: 0.8;
    }

    
    .chat-window {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 15px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

   
    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 60%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .msg.owner {
      background: #e5e7eb;
      align-self: flex-start;
    }

    .msg.user {
      background: #3b82f6;
      color: white;
      align-self: flex-end;
      margin-left: auto;
    }

    /* Input */
    .input-box {
      display: flex;
      padding: 10px;
      background: white;
      border-top: 1px solid #ddd;
    }

    .input-box input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .input-box button {
      margin-left: 10px;
      padding: 10px 15px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .input-box button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

<div class="chat-container">

  
  <div class="sidebar">
    <h2>Chats</h2>

    <div class="chat-item active">
      <p class="name">Ahmed (Owner)</p>
    
    </div>

    <div class="chat-item">
      <p class="name">Sara (Driver)</p>
      
    </div>
  </div>

 
<div class="chat-window">

    <div class="chat-header">
        <h3>Ahmed (Owner)</h3>
    </div>

    <div class="messages" id="messages">
       
    </div>

    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

</div>

<script>
  function sendMessage() {
    const input = document.getElementById("msgInput");
    const text = input.value.trim();

    if (text === "") return;

    
    const msg = document.createElement("div");
    msg.classList.add("msg", "user");

    const p = document.createElement("p");
    p.innerText = text;

    msg.appendChild(p);

   
    document.getElementById("messages").appendChild(msg);

    
    input.value = "";

    
    document.getElementById("messages").scrollTop =
      document.getElementById("messages").scrollHeight;
  }

 
  document.getElementById("msgInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });
</script>

</body>
</html>
