<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CitySlot - Owner Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; }

        /*  Sidebar */
        .side-drawer {
            height: 100vh;
            width: 0;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0; /* مكانه في الشمال */
            background-color: #000000;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 3rem;
        }
        .side-drawer a {
            padding: 1rem 2rem;
            text-decoration: none;
            font-size: 1rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            transition: 0.3s;
            border-bottom: 1px solid #111;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .side-drawer a i { margin-right: 15px; width: 20px; text-align: center; color: #888; }
        .side-drawer a:hover { background-color: #ffffff; color: #000000; }
        .side-drawer a:hover i { color: #000000; }
        .close-btn { color: #666 !important; text-align: left !important; font-size: 0.8rem !important; }

        /* --- الـ Dashboard العادية بتاعتك --- */
        .page-wrapper { background-color: white; border-bottom: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .navbar { padding: 1rem 3%; display: flex; justify-content: space-between; align-items: center; }
        .site-title { font-weight: bold; color: #4F5D95; font-size: 1.2rem; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; color: #4F5D95; }

        .main-content { padding: 2rem 5vw; }
        .stat-card {
            background: white; padding: 2rem; border-radius: 0.75rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
            border-top: 0.3rem solid #4F5D95; margin-bottom: 1.5rem;
        }
        .stat-card h2 { color: #4F5D95; font-weight: bold; }

        /* Add Spot */
        .btn-add-custom {
            background-color: #4F5D95; color: white; border: none;
            border-radius: 2rem; padding: 0.6rem 2rem; font-weight: 600;
        }
        .btn-add-custom:hover { background-color: #3b4675; color: white; }

        /* Modal styling */
        .modal-content { border-radius: 1rem; border-top: 0.5rem solid #4F5D95; }
    </style>
</head>
<body>

    <div id="sideDrawer" class="side-drawer">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleSidebar()">Close Menu ×</a>
        <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="spots.html"><i class="fas fa-parking"></i> My Spots</a> 
        <a href="earnings.html"><i class="fas fa-wallet"></i> Earnings</a>
        <a href="reviews.html"><i class="fas fa-star"></i> Reviews</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
    </div>

    <div class="page-wrapper">
        <nav class="navbar">
            <div class="menu-icon" onclick="toggleSidebar()">☰</div> <div class="d-flex align-items-center">
                <span class="site-title">CitySlot</span> <span style="font-size: 1.5rem; margin-left: 10px;">🚘</span>
            </div>
        </nav>
    </div>

    <main class="main-content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Owner Dashboard</h2>
                <button class="btn-add-custom" data-bs-toggle="modal" data-bs-target="#addSpotModal">
                    Add New Spot +
                </button>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="stat-card">
                        <small class="text-muted fw-bold">TOTAL REVENUE</small>
                        <h2>$0.00</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <small class="text-muted fw-bold">REGISTERED SPOTS</small>
                        <h2>0</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <small class="text-muted fw-bold">AVG. RATING</small>
                        <h2>0.0</h2>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="addSpotModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Add New Parking Spot</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form action="process_add_spot.php" method="POST">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Spot Name</label>
                            <input type="text" name="spot_name" class="form-control" placeholder="e.g. Downtown Garage" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Location</label>
                            <input type="text" name="address" class="form-control" placeholder="Enter address" required>
                        </div>
                        <div class="row">
                            <div class="col-6"><label class="form-label fw-bold">Price/Hr</label><input type="number" name="price" class="form-control" required></div>
                            <div class="col-6"><label class="form-label fw-bold">Capacity</label><input type="number" name="capacity" class="form-control" required></div>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-add-custom">Save Spot</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            const drawer = document.getElementById("sideDrawer");
            drawer.style.width = (drawer.style.width === "260px") ? "0" : "260px";
        }
    </script>
</body>
</html>
