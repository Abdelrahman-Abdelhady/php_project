<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CitySlot - Financial Earnings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column; 
            min-height: 100vh; 
        }

        /* --- الـ Side Bar: أبيض وأسود محترف في الشمال --- */
        .side-drawer {
            height: 100vh;
            width: 0;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0; /* مكانه في الشمال */
            background-color: #000000;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 3rem;
        }
        .side-drawer a {
            padding: 1rem 2rem;
            text-decoration: none;
            font-size: 1rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            transition: 0.3s;
            border-bottom: 1px solid #111;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .side-drawer a i { margin-right: 15px; width: 20px; text-align: center; color: #888; }
        .side-drawer a:hover { background-color: #ffffff; color: #000000; }
        .side-drawer a:hover i { color: #000000; }
        .close-btn { color: #666 !important; text-align: left !important; font-size: 0.8rem !important; cursor: pointer; padding: 1rem 2rem; }

        /* --- Navbar: ألوان الداشبورد --- */
        .page-wrapper {
            background-color: white;
            border-bottom: 0.06rem solid #eee;
            box-shadow: 0 0.125rem 0.3rem rgba(0,0,0,0.05);
        }
        .navbar { padding: 1rem 3%; display: flex; justify-content: space-between; align-items: center; }
        .site-title { font-weight: bold; color: #4F5D95; font-size: 1.2rem; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; color: #4F5D95; }

        /* --- Earnings Content --- */
        .main-content { flex-grow: 1; padding: 2rem 5vw; }
        
        .balance-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 0.25rem 1.25rem rgba(0,0,0,0.05);
            border-top: 0.5rem solid #28a745; /* أخضر للمال */
            text-align: center;
            margin-bottom: 2rem;
        }

        .withdraw-btn {
            background-color: #4F5D95;
            color: white;
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 2rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .withdraw-btn:hover { background-color: #3b4675; color: white; }

        .table-card {
            border-radius: 1rem;
            overflow: hidden;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div id="sideDrawer" class="side-drawer">
        <div class="close-btn" onclick="toggleSidebar()">Close Menu ×</div>
        <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="spots.html"><i class="fas fa-parking"></i> My Spots</a> 
        <a href="earnings.html"><i class="fas fa-wallet"></i> Earnings</a>
        <a href="reviews.html"><i class="fas fa-star"></i> Reviews</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
    </div>

    <div class="page-wrapper">
        <nav class="navbar">
            <div class="menu-icon" onclick="toggleSidebar()">☰</div>
            <div class="d-flex align-items-center">
                <span class="site-title">CitySlot</span>
                <span style="font-size: 1.5rem; margin-left: 10px;">🚘</span>
            </div>
        </nav>
    </div>

    <main class="main-content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Financial Earnings</h2>
                <button class="withdraw-btn shadow-sm">Withdraw Money</button>
            </div>

            <div class="balance-card">
                <small class="text-muted fw-bold text-uppercase">Total Available Balance</small>
                <h1 class="display-4 fw-bold text-success mt-2">$0.00</h1>
                <p class="text-muted">You have <strong>$0.00</strong> pending clearance.</p>
            </div>

            <div class="card table-card">
                <div class="card-header bg-white py-3 border-bottom">
                    <h5 class="mb-0 fw-bold" style="color: #4F5D95;">Recent Transactions</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 text-center">
                            <thead class="table-light">
                                <tr>
                                    <th class="py-3">Booking ID</th>
                                    <th class="py-3">Date</th>
                                    <th class="py-3">Amount</th>
                                    <th class="py-3">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="4" class="py-5 text-muted">
                                        <i class="fas fa-info-circle me-1"></i> No transactions recorded yet.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            const drawer = document.getElementById("sideDrawer");
            drawer.style.width = (drawer.style.width === "260px") ? "0" : "260px";
        }
    </script>
</body>
</html>
