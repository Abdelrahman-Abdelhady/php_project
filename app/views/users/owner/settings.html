<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CitySlot - Profile Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column; 
            min-height: 100vh; 
        }

        /*  Sidebar */
        .side-drawer {
            height: 100vh;
            width: 0;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            background-color: #000000;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 3rem;
        }
        .side-drawer a {
            padding: 1rem 2rem;
            text-decoration: none;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            transition: 0.3s;
            border-bottom: 1px solid #111;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .side-drawer a i { margin-right: 15px; width: 20px; text-align: center; color: #888; }
        .side-drawer a:hover { background-color: #ffffff; color: #000000; }
        .side-drawer a:hover i { color: #000000; }
        .close-btn { color: #666 !important; text-align: left !important; font-size: 0.8rem !important; cursor: pointer; padding: 1rem 2rem; }

        /*Navbar */
        .page-wrapper { background-color: white; border-bottom: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .navbar { padding: 1rem 3%; display: flex; justify-content: space-between; align-items: center; }
        .site-title { font-weight: bold; color: #4F5D95; font-size: 1.2rem; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; color: #4F5D95; }

        /* Profile Specific Styles  */
        .main-content { flex-grow: 1; padding: 2rem 5vw; }
        .profile-header {
            background-color: #4F5D95;
            color: white;
            border-radius: 1rem 1rem 0 0;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.2);
            margin-bottom: 1rem;
            object-fit: cover;
            background-color: #fff;
        }
        .settings-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-top: -2.5rem;
            padding: 2.5rem;
            margin-bottom: 3rem;
            border: none;
        }
        .save-btn {
            background-color: #4F5D95;
            color: white;
            border-radius: 2rem;
            padding: 0.8rem 3rem;
            border: none;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .save-btn:hover { background-color: #3b4675; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 93, 149, 0.3); }

        .form-label { color: #4F5D95; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.5px; }
        .form-control { padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #e1e1e1; }
        .form-control:focus { border-color: #4F5D95; box-shadow: 0 0 0 0.2rem rgba(79, 93, 149, 0.1); }
    </style>
</head>
<body>

    <div id="sideDrawer" class="side-drawer">
        <div class="close-btn" onclick="toggleSidebar()">Close Menu ×</div>
        <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="spots.html"><i class="fas fa-parking"></i> My Spots</a> 
        <a href="earnings.html"><i class="fas fa-wallet"></i> Earnings</a>
        <a href="reviews.html"><i class="fas fa-star"></i> Reviews</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
    </div>

    <div class="page-wrapper">
        <nav class="navbar">
            <div class="menu-icon" onclick="toggleSidebar()">☰</div>
            <div class="d-flex align-items-center">
                <span class="site-title">CitySlot</span>
                <span style="font-size: 1.5rem; margin-left: 10px;">🚘</span>
            </div>
        </nav>
    </div>

    <main class="main-content">
        <div class="container" style="max-width: 850px;">
            
            <div class="profile-header">
                <div class="position-relative d-inline-block">
                    <img src="https://via.placeholder.com/130?text=User" alt="Owner Photo" class="profile-img shadow">
                    <span class="position-absolute bottom-0 end-0 bg-white p-2 rounded-circle shadow-sm" style="cursor: pointer;">
                        <i class="fas fa-camera text-primary" style="font-size: 0.9rem;"></i>
                    </span>
                </div>
                <h3 class="fw-bold mb-1">Owner Account</h3>
                <p class="mb-0 text-white-50"><i class="fas fa-check-circle me-1"></i> Verified Parking Provider</p>
            </div>

            <div class="settings-card">
                <h5 class="fw-bold mb-4 border-bottom pb-3" style="color: #333;">
                    <i class="fas fa-user-edit me-2 text-muted"></i>Account Information
                </h5>
                
                <form action="update_profile.php" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label text-uppercase">Full Name</label>
                            <input type="text" name="full_name" class="form-control" placeholder="John Doe" value="">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label text-uppercase">Phone Number</label>
                            <input type="text" name="phone" class="form-control" placeholder="+20 123 456 789" value="">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-uppercase">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                            <input type="email" name="email" class="form-control border-start-0" placeholder="example@cityslot.com" value="">
                        </div>
                    </div>

                    <div class="row mb-5">
                        <div class="col-md-12">
                            <label class="form-label text-uppercase">Update Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" name="new_password" class="form-control border-start-0" placeholder="Enter new password (leave blank to keep current)">
                            </div>
                        </div>
                    </div>
                    
                    <div class="text-center">
                        <button type="submit" class="save-btn shadow">Save Changes</button>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            const drawer = document.getElementById("sideDrawer");
            drawer.style.width = (drawer.style.width === "260px") ? "0" : "260px";
        }
    </script>
</body>
</html>
